<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo.title} + ' - OMDB'">Resultado - OMDB</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            gap: 30px;
        }
        .poster img {
            width: 200px;
            border-radius: 4px;
        }
        .poster .sem-poster {
            width: 200px;
            height: 296px;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            border-radius: 4px;
            font-size: 14px;
        }
        .info h1 { margin-top: 0; color: #333; font-size: 24px; }
        .info p { margin: 6px 0; color: #555; line-height: 1.5; }
        .info strong { color: #333; }
        .badge {
            display: inline-block;
            background: #e8a000;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 13px;
            margin-right: 6px;
        }
        .rating {
            font-size: 22px;
            font-weight: bold;
            color: #e8a000;
        }
        .erro {
            background: #fff3f3;
            border: 1px solid #f5c6cb;
            padding: 20px;
            border-radius: 8px;
            color: #721c24;
        }
        .voltar {
            display: inline-block;
            margin-bottom: 20px;
            color: #e8a000;
            text-decoration: none;
            font-size: 15px;
        }
        .voltar:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="/" class="voltar">&larr; Nova busca</a>

    <!-- Resposta com erro da API -->
    <div class="erro" th:if="${titulo.response == 'False'}">
        <strong>Título não encontrado.</strong>
        <p th:text="${titulo.error}"></p>
    </div>

    <!-- Resultado encontrado -->
    <div class="card" th:unless="${titulo.response == 'False'}">
        <div class="poster">
            <img th:if="${titulo.poster != null and titulo.poster != 'N/A'}"
                 th:src="${titulo.poster}"
                 th:alt="${titulo.title}" />
            <div class="sem-poster" th:unless="${titulo.poster != null and titulo.poster != 'N/A'}">
                Sem imagem
            </div>
        </div>

        <div class="info">
            <h1 th:text="${titulo.title}">Título</h1>

            <p>
                <span class="badge" th:text="${titulo.type}">Tipo</span>
                <span th:text="${titulo.year}">Ano</span>
                <span th:if="${titulo.runtime != null and titulo.runtime != 'N/A'}">
                    &bull; <span th:text="${titulo.runtime}">Duração</span>
                </span>
            </p>

            <p class="rating">
                &#9733; <span th:text="${titulo.imdbRating}">N/A</span>
                <span style="font-size:14px; color:#999;">/10 (IMDb)</span>
            </p>

            <p th:if="${titulo.genre != null and titulo.genre != 'N/A'}">
                <strong>Gênero:</strong> <span th:text="${titulo.genre}"></span>
            </p>

            <p th:if="${titulo.director != null and titulo.director != 'N/A'}">
                <strong>Diretor:</strong> <span th:text="${titulo.director}"></span>
            </p>

            <p th:if="${titulo.actors != null and titulo.actors != 'N/A'}">
                <strong>Elenco:</strong> <span th:text="${titulo.actors}"></span>
            </p>

            <p th:if="${titulo.totalSeasons != null and titulo.totalSeasons != 'N/A'}">
                <strong>Temporadas:</strong> <span th:text="${titulo.totalSeasons}"></span>
            </p>

            <p th:if="${titulo.plot != null and titulo.plot != 'N/A'}">
                <strong>Sinopse:</strong><br/>
                <span th:text="${titulo.plot}"></span>
            </p>
        </div>
    </div>
</body>
</html>
